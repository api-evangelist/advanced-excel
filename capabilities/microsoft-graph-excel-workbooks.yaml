naftiko: 1.0.0-alpha2
info:
  label: Microsoft Graph Excel API — Workbooks
  description: 'Microsoft Graph Excel API — Workbooks. 1 operations. Lead operation: Microsoft Excel Create Workbook Session.
    Self-contained Naftiko capability covering one Advanced Excel business surface.'
  tags:
  - Advanced Excel
  - Workbooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADVANCED_EXCEL_API_KEY: ADVANCED_EXCEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: microsoft-graph-excel-workbooks
    baseUri: https://graph.microsoft.com/v1.0
    description: Microsoft Graph Excel API — Workbooks business capability. Self-contained, no shared references.
    resources:
    - name: me-drive-items-driveItemId-workbook-createSession
      path: /me/drive/items/{driveItemId}/workbook/createSession
      operations:
      - name: createworkbooksession
        method: POST
        description: Microsoft Excel Create Workbook Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: driveItemId
          in: path
          type: string
          description: OneDrive item ID of the Excel workbook.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ADVANCED_EXCEL_API_KEY}}'
  exposes:
  - type: rest
    namespace: microsoft-graph-excel-workbooks-rest
    port: 8080
    description: REST adapter for Microsoft Graph Excel API — Workbooks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/me/drive/items/{driveitemid}/workbook/createsession
      name: me-drive-items-driveitemid-workbook-createsession
      description: REST surface for me-drive-items-driveItemId-workbook-createSession.
      operations:
      - method: POST
        name: createworkbooksession
        description: Microsoft Excel Create Workbook Session
        call: microsoft-graph-excel-workbooks.createworkbooksession
        with:
          driveItemId: rest.driveItemId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microsoft-graph-excel-workbooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Graph Excel API — Workbooks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: microsoft-excel-create-workbook-session
      description: Microsoft Excel Create Workbook Session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: microsoft-graph-excel-workbooks.createworkbooksession
      with:
        driveItemId: tools.driveItemId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
