description: >-
  Advanced Excel is a subject-matter topic encompassing Microsoft Excel's programmatic capabilities for data analysis,
  formula execution, workbook management, chart generation, and automation. This topic index covers REST APIs, open data
  schemas, and developer tools for working with Excel workbooks programmatically, including Microsoft Graph Excel API,
  open-source spreadsheet libraries, and data interchange formats used in business intelligence and automation
  workflows.
