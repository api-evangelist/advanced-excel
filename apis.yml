apis:
  - name: Microsoft Graph Excel API
    description: >-
      The Microsoft Graph Excel API provides REST access to Excel workbooks stored in OneDrive, SharePoint, or Teams.
      Supports reading and writing cell values, executing formulas, managing worksheets, creating charts and tables, and
      running workbook sessions for transactional batch operations.
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/excel
    baseURL: https://graph.microsoft.com/v1.0
